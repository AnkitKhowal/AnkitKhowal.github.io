<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <filter id="s2" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="720" height="400" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Neural Network = Layers of Neurons</text>

  <rect x="50" y="55" width="100" height="300" rx="12" fill="#ede9fe" opacity="0.4"/>
  <rect x="215" y="55" width="100" height="300" rx="12" fill="#dbeafe" opacity="0.4"/>
  <rect x="380" y="55" width="100" height="300" rx="12" fill="#dbeafe" opacity="0.4"/>
  <rect x="545" y="55" width="100" height="300" rx="12" fill="#d1fae5" opacity="0.4"/>

  <text x="100" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Input</text>
  <text x="265" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Hidden 1</text>
  <text x="430" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Hidden 2</text>
  <text x="595" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Output</text>

  <g stroke="#c4b5fd" stroke-width="1" opacity="0.4">
    <line x1="120" y1="130" x2="245" y2="120"/><line x1="120" y1="130" x2="245" y2="190"/>
    <line x1="120" y1="130" x2="245" y2="260"/><line x1="120" y1="130" x2="245" y2="330"/>
    <line x1="120" y1="200" x2="245" y2="120"/><line x1="120" y1="200" x2="245" y2="190"/>
    <line x1="120" y1="200" x2="245" y2="260"/><line x1="120" y1="200" x2="245" y2="330"/>
    <line x1="120" y1="270" x2="245" y2="120"/><line x1="120" y1="270" x2="245" y2="190"/>
    <line x1="120" y1="270" x2="245" y2="260"/><line x1="120" y1="270" x2="245" y2="330"/>
  </g>

  <g stroke="#93c5fd" stroke-width="1" opacity="0.4">
    <line x1="285" y1="120" x2="410" y2="140"/><line x1="285" y1="120" x2="410" y2="220"/>
    <line x1="285" y1="120" x2="410" y2="300"/>
    <line x1="285" y1="190" x2="410" y2="140"/><line x1="285" y1="190" x2="410" y2="220"/>
    <line x1="285" y1="190" x2="410" y2="300"/>
    <line x1="285" y1="260" x2="410" y2="140"/><line x1="285" y1="260" x2="410" y2="220"/>
    <line x1="285" y1="260" x2="410" y2="300"/>
    <line x1="285" y1="330" x2="410" y2="140"/><line x1="285" y1="330" x2="410" y2="220"/>
    <line x1="285" y1="330" x2="410" y2="300"/>
  </g>

  <g stroke="#6ee7b7" stroke-width="1" opacity="0.4">
    <line x1="450" y1="140" x2="575" y2="190"/>
    <line x1="450" y1="140" x2="575" y2="260"/>
    <line x1="450" y1="220" x2="575" y2="190"/>
    <line x1="450" y1="220" x2="575" y2="260"/>
    <line x1="450" y1="300" x2="575" y2="190"/>
    <line x1="450" y1="300" x2="575" y2="260"/>
  </g>

  <circle cx="100" cy="130" r="20" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2" filter="url(#s2)"/>
  <circle cx="100" cy="200" r="20" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2" filter="url(#s2)"/>
  <circle cx="100" cy="270" r="20" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2" filter="url(#s2)"/>
  <text x="100" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#3b0764">x1</text>
  <text x="100" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#3b0764">x2</text>
  <text x="100" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#3b0764">x3</text>

  <circle cx="265" cy="120" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>
  <circle cx="265" cy="190" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>
  <circle cx="265" cy="260" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>
  <circle cx="265" cy="330" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>

  <circle cx="430" cy="140" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>
  <circle cx="430" cy="220" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>
  <circle cx="430" cy="300" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2" filter="url(#s2)"/>

  <circle cx="595" cy="190" r="20" fill="#6ee7b7" stroke="#059669" stroke-width="2" filter="url(#s2)"/>
  <circle cx="595" cy="260" r="20" fill="#6ee7b7" stroke="#059669" stroke-width="2" filter="url(#s2)"/>
  <text x="595" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#064e3b">cat</text>
  <text x="595" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#064e3b">dog</text>

  <text x="100" y="320" text-anchor="middle" font-size="10" fill="#6b7280">pixel values</text>
  <text x="265" y="375" text-anchor="middle" font-size="10" fill="#6b7280">learned features</text>
  <text x="430" y="375" text-anchor="middle" font-size="10" fill="#6b7280">complex patterns</text>
  <text x="595" y="320" text-anchor="middle" font-size="10" fill="#6b7280">prediction</text>

  <text x="360" y="395" text-anchor="middle" font-size="11" fill="#94a3b8">data flows left to right through the network</text>
</svg>
