<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <filter id="sp" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="720" height="300" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Left side: the table -->
  <text x="160" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">The Data You Have</text>

  <rect x="60" y="48" width="200" height="230" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sp)"/>

  <!-- Header -->
  <rect x="60" y="48" width="100" height="35" rx="10 0 0 0" fill="#6366f1"/>
  <rect x="60" y="68" width="100" height="15" fill="#6366f1"/>
  <rect x="160" y="48" width="100" height="35" rx="0 10 0 0" fill="#10b981"/>
  <rect x="160" y="68" width="100" height="15" fill="#10b981"/>
  <text x="110" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="white">X (input)</text>
  <text x="210" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="white">Y (output)</text>

  <!-- Rows -->
  <text x="110" y="105" text-anchor="middle" font-size="14" fill="#334155">1</text>
  <text x="210" y="105" text-anchor="middle" font-size="14" fill="#334155">3</text>
  <line x1="60" y1="115" x2="260" y2="115" stroke="#f1f5f9" stroke-width="1"/>

  <text x="110" y="140" text-anchor="middle" font-size="14" fill="#334155">2</text>
  <text x="210" y="140" text-anchor="middle" font-size="14" fill="#334155">5</text>
  <line x1="60" y1="150" x2="260" y2="150" stroke="#f1f5f9" stroke-width="1"/>

  <text x="110" y="175" text-anchor="middle" font-size="14" fill="#334155">3</text>
  <text x="210" y="175" text-anchor="middle" font-size="14" fill="#334155">7</text>
  <line x1="60" y1="185" x2="260" y2="185" stroke="#f1f5f9" stroke-width="1"/>

  <text x="110" y="210" text-anchor="middle" font-size="14" fill="#334155">4</text>
  <text x="210" y="210" text-anchor="middle" font-size="14" fill="#334155">9</text>
  <line x1="60" y1="220" x2="260" y2="220" stroke="#f1f5f9" stroke-width="1"/>

  <text x="110" y="245" text-anchor="middle" font-size="14" fill="#334155">5</text>
  <text x="210" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">?</text>
  <line x1="60" y1="255" x2="260" y2="255" stroke="#f1f5f9" stroke-width="1"/>

  <text x="110" y="272" text-anchor="middle" font-size="14" fill="#334155">100</text>
  <text x="210" y="272" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">?</text>

  <!-- Right side: the graph -->
  <text x="510" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Plot It and You See a Pattern</text>

  <rect x="360" y="48" width="330" height="230" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sp)"/>

  <!-- Axes -->
  <line x1="410" y1="250" x2="660" y2="250" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="410" y1="250" x2="410" y2="70" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="540" y="275" text-anchor="middle" font-size="11" fill="#64748b">X</text>
  <text x="390" y="160" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90, 390, 160)">Y</text>

  <!-- Axis ticks -->
  <text x="410" y="265" text-anchor="middle" font-size="9" fill="#94a3b8">0</text>
  <text x="470" y="265" text-anchor="middle" font-size="9" fill="#94a3b8">1</text>
  <text x="530" y="265" text-anchor="middle" font-size="9" fill="#94a3b8">2</text>
  <text x="590" y="265" text-anchor="middle" font-size="9" fill="#94a3b8">3</text>
  <text x="650" y="265" text-anchor="middle" font-size="9" fill="#94a3b8">4</text>

  <text x="403" y="210" text-anchor="end" font-size="9" fill="#94a3b8">3</text>
  <text x="403" y="170" text-anchor="end" font-size="9" fill="#94a3b8">5</text>
  <text x="403" y="130" text-anchor="end" font-size="9" fill="#94a3b8">7</text>
  <text x="403" y="90" text-anchor="end" font-size="9" fill="#94a3b8">9</text>

  <!-- Data points -->
  <circle cx="470" cy="210" r="7" fill="#6366f1" filter="url(#sp)"/>
  <circle cx="530" cy="170" r="7" fill="#6366f1" filter="url(#sp)"/>
  <circle cx="590" cy="130" r="7" fill="#6366f1" filter="url(#sp)"/>
  <circle cx="650" cy="90" r="7" fill="#6366f1" filter="url(#sp)"/>

  <!-- Best fit line -->
  <line x1="440" y1="230" x2="665" y2="78" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" opacity="0.8"/>

  <!-- Label on line -->
  <rect x="545" y="92" width="90" height="24" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="590" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Y = 2X + 1</text>

  <!-- Bottom text -->
  <text x="360" y="296" text-anchor="middle" font-size="11" fill="#64748b">Can you guess Y when X = 5? What about X = 100? If you said 11 and 201, you just did what a neural network does.</text>
</svg>
