<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="720" height="300" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Real Life: From Simple to Complex</text>

  <!-- Simple (left) -->
  <rect x="30" y="48" width="300" height="110" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="180" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Easy: 1 input, linear</text>

  <rect x="50" y="88" width="85" height="30" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="92" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">sq. footage</text>

  <line x1="138" y1="103" x2="185" y2="103" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="190" y="88" width="55" height="30" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="217" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">f(x)</text>

  <line x1="248" y1="103" x2="265" y2="103" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="270" y="88" width="45" height="30" rx="6" fill="#dcfce7" stroke="#34d399" stroke-width="1.5"/>
  <text x="292" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">price</text>

  <text x="180" y="145" text-anchor="middle" font-size="10" fill="#64748b">You can eyeball this. Maybe price = 200 x sqft.</text>

  <!-- Complex (right) -->
  <rect x="370" y="48" width="320" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="530" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Hard: 10 inputs, nonlinear</text>

  <!-- Input list -->
  <rect x="390" y="86" width="95" height="22" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="437" y="101" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">sq. footage</text>

  <rect x="390" y="112" width="95" height="22" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="437" y="127" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">bedrooms</text>

  <rect x="390" y="138" width="95" height="22" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="437" y="153" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">distance to city</text>

  <rect x="390" y="164" width="95" height="22" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="437" y="179" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">crime rate</text>

  <rect x="390" y="190" width="95" height="22" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="437" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">school rating</text>

  <rect x="390" y="216" width="95" height="22" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="437" y="231" text-anchor="middle" font-size="9" fill="#64748b">... 5 more</text>

  <!-- Arrows to neural net -->
  <line x1="488" y1="97" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="488" y1="123" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="488" y1="149" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="488" y1="175" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="488" y1="201" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="488" y1="227" x2="540" y2="155" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>

  <!-- Neural net box -->
  <rect x="540" y="125" width="80" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <text x="580" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Neural</text>
  <text x="580" y="165" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Network</text>
  <text x="580" y="178" text-anchor="middle" font-size="8" fill="#7c3aed">learns f(x)</text>

  <line x1="620" y1="155" x2="640" y2="155" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="645" y="140" width="38" height="30" rx="6" fill="#dcfce7" stroke="#34d399" stroke-width="1.5"/>
  <text x="664" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">price</text>

  <text x="530" y="250" text-anchor="middle" font-size="10" fill="#64748b">Too many inputs, too complex. You need a</text>
  <text x="530" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">machine to find the pattern for you.</text>

  <!-- Bottom -->
  <text x="360" y="290" text-anchor="middle" font-size="11" fill="#475569">Neural networks are pattern-finding machines. You provide examples. They figure out the rules.</text>
</svg>
