<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <filter id="s5" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="720" height="300" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">The Training Loop</text>

  <!-- Step 1 -->
  <rect x="50" y="60" width="130" height="70" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#s5)"/>
  <text x="115" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">1. Feed Data</text>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#7c3aed">batch of examples</text>
  <line x1="180" y1="95" x2="220" y2="95" stroke="#6366f1" stroke-width="2" marker-end="url(#al)"/>

  <!-- Step 2 -->
  <rect x="225" y="60" width="130" height="70" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#s5)"/>
  <text x="290" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">2. Forward</text>
  <text x="290" y="103" text-anchor="middle" font-size="10" fill="#2563eb">make predictions</text>
  <text x="290" y="118" text-anchor="middle" font-size="10" fill="#2563eb">with current weights</text>
  <line x1="355" y1="95" x2="395" y2="95" stroke="#6366f1" stroke-width="2" marker-end="url(#al)"/>

  <!-- Step 3 -->
  <rect x="400" y="60" width="130" height="70" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#s5)"/>
  <text x="465" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">3. Compute</text>
  <text x="465" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Loss</text>
  <text x="465" y="118" text-anchor="middle" font-size="10" fill="#dc2626">how wrong?</text>
  <line x1="530" y1="95" x2="570" y2="95" stroke="#6366f1" stroke-width="2" marker-end="url(#al)"/>

  <!-- Step 4 -->
  <rect x="575" y="60" width="110" height="70" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#s5)"/>
  <text x="630" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">4. Backward</text>
  <text x="630" y="103" text-anchor="middle" font-size="10" fill="#b45309">calculate</text>
  <text x="630" y="118" text-anchor="middle" font-size="10" fill="#b45309">gradients</text>

  <!-- Arrow down from step 4 -->
  <line x1="630" y1="130" x2="630" y2="175" stroke="#6366f1" stroke-width="2" marker-end="url(#al)"/>

  <!-- Step 5 -->
  <rect x="555" y="180" width="150" height="65" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#s5)"/>
  <text x="630" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">5. Update Weights</text>
  <text x="630" y="227" text-anchor="middle" font-size="10" fill="#15803d">nudge toward less error</text>

  <!-- Curved arrow back to step 1 -->
  <path d="M 555,215 C 400,260 200,260 100,150" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#al)"/>

  <!-- Repeat label -->
  <rect x="270" y="235" width="180" height="35" rx="8" fill="#f0f0ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="360" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#4338ca">Repeat 1000s of times</text>

  <!-- Bottom text -->
  <text x="360" y="293" text-anchor="middle" font-size="11" fill="#64748b">Each loop makes the model slightly better. Training = running this loop until the loss is low enough.</text>
</svg>
