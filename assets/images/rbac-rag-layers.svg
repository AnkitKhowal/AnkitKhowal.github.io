<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="rrPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="rrGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="rrShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="rrArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="rrArrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="860" height="380" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">RBAC in RAG: Six Layers of Defence</text>
  <text x="430" y="54" text-anchor="middle" font-size="11" fill="#64748b">Every hop in the pipeline gets its own permission check</text>

  <!-- ============ PIPELINE (y ~ 180) ============ -->

  <!-- User -->
  <circle cx="58" cy="180" r="26" fill="url(#rrPurple)" filter="url(#rrShadow)"/>
  <text x="58" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="white">User</text>
  <text x="58" y="222" text-anchor="middle" font-size="9" fill="#64748b">role: intern</text>

  <!-- User -> Retriever arrow -->
  <line x1="86" y1="180" x2="164" y2="180" stroke="#6366f1" stroke-width="2.5" marker-end="url(#rrArrow)"/>

  <!-- Retriever -->
  <rect x="170" y="155" width="130" height="50" rx="10" fill="url(#rrPurple)" filter="url(#rrShadow)"/>
  <text x="235" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="white">Retriever</text>
  <text x="235" y="193" text-anchor="middle" font-size="9" fill="#e0e7ff">embed + search</text>

  <!-- Retriever -> VDB arrow -->
  <line x1="300" y1="180" x2="368" y2="180" stroke="#6366f1" stroke-width="2.5" marker-end="url(#rrArrow)"/>

  <!-- Vector DB cylinder -->
  <ellipse cx="415" cy="160" rx="47" ry="9" fill="#c7d2fe" stroke="#818cf8" stroke-width="1.5"/>
  <path d="M 368,160 L 368,200 A 47,9 0 0 0 462,200 L 462,160" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <ellipse cx="415" cy="160" rx="47" ry="9" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <text x="415" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">Vector DB</text>

  <!-- VDB -> LLM arrow -->
  <line x1="462" y1="180" x2="528" y2="180" stroke="#6366f1" stroke-width="2.5" marker-end="url(#rrArrow)"/>

  <!-- LLM -->
  <rect x="530" y="155" width="120" height="50" rx="10" fill="url(#rrPurple)" filter="url(#rrShadow)"/>
  <text x="590" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="white">LLM</text>

  <!-- LLM -> Answer arrow -->
  <line x1="650" y1="180" x2="720" y2="180" stroke="#10b981" stroke-width="2.5" marker-end="url(#rrArrowGreen)"/>

  <!-- Answer -->
  <rect x="722" y="155" width="100" height="50" rx="10" fill="url(#rrGreen)" filter="url(#rrShadow)"/>
  <text x="772" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="white">Answer</text>

  <!-- ============ SHIELDS ============ -->
  <!-- Shield 1: Identity (above gap 1, midpoint ~125) -->
  <rect x="78" y="95" width="96" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="126" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">1. Identity</text>
  <text x="126" y="125" text-anchor="middle" font-size="8" fill="#b45309">OIDC / SAML</text>
  <line x1="126" y1="127" x2="126" y2="165" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="3,3"/>

  <!-- Shield 2: Pre-filter ACL (below gap 2, midpoint ~334) -->
  <line x1="334" y1="200" x2="334" y2="235" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="3,3"/>
  <rect x="284" y="235" width="100" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="334" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">2. Pre-filter</text>
  <text x="334" y="263" text-anchor="middle" font-size="8" fill="#b45309">ACL metadata</text>

  <!-- Shield 3: Authz check (above gap 3, midpoint ~495) -->
  <rect x="446" y="95" width="98" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="495" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">3. Authz</text>
  <text x="495" y="125" text-anchor="middle" font-size="8" fill="#b45309">OpenFGA / Cerbos</text>
  <line x1="495" y1="127" x2="495" y2="165" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="3,3"/>

  <!-- Shield 4: Prompt guard (below LLM) -->
  <line x1="590" y1="205" x2="590" y2="235" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="3,3"/>
  <rect x="540" y="235" width="100" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">4. Prompt guard</text>
  <text x="590" y="263" text-anchor="middle" font-size="8" fill="#b45309">role-scoped prompt</text>

  <!-- Shield 5: Output filter (above gap 4, midpoint ~685) -->
  <rect x="636" y="95" width="100" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="686" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">5. Output filter</text>
  <text x="686" y="125" text-anchor="middle" font-size="8" fill="#b45309">PII / policy scan</text>
  <line x1="686" y1="127" x2="686" y2="165" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="3,3"/>

  <!-- ============ AUDIT LOG BANNER (6) ============ -->
  <rect x="40" y="305" width="780" height="40" rx="10" fill="#fce7f3" stroke="#f472b6" stroke-width="1.5"/>
  <text x="60" y="328" text-anchor="start" font-size="11" font-weight="700" fill="#9d174d">6. Audit log</text>
  <text x="430" y="328" text-anchor="middle" font-size="10" fill="#831843">every query | every retrieved chunk | every citation | every denial</text>

  <!-- Connector dots from each shield down to audit banner -->
  <circle cx="126" cy="305" r="2" fill="#f472b6"/>
  <circle cx="334" cy="305" r="2" fill="#f472b6"/>
  <circle cx="495" cy="305" r="2" fill="#f472b6"/>
  <circle cx="590" cy="305" r="2" fill="#f472b6"/>
  <circle cx="686" cy="305" r="2" fill="#f472b6"/>

  <!-- Legend -->
  <rect x="40" y="358" width="12" height="12" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="58" y="368" font-size="9" fill="#64748b">permission checkpoint</text>
  <rect x="200" y="358" width="12" height="12" rx="3" fill="#fce7f3" stroke="#f472b6" stroke-width="1"/>
  <text x="218" y="368" font-size="9" fill="#64748b">observability</text>
  <rect x="330" y="358" width="12" height="12" rx="3" fill="url(#rrPurple)"/>
  <text x="348" y="368" font-size="9" fill="#64748b">pipeline stage</text>
</svg>
