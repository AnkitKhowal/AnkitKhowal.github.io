<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="hillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="s4" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="720" height="320" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Gradient Descent: Rolling Downhill to Find the Best Weights</text>

  <path d="M 80,100 C 120,95 140,80 180,120 C 210,150 230,220 280,240 C 330,260 360,255 400,210 C 430,175 450,150 500,180 C 530,200 560,230 590,250 C 610,260 630,262 650,260" fill="url(#hillGrad)" stroke="#93c5fd" stroke-width="2"/>

  <line x1="60" y1="60" x2="60" y2="280" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="40" y="170" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90, 40, 170)">Loss (error)</text>

  <line x1="60" y1="280" x2="670" y2="280" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="370" y="300" text-anchor="middle" font-size="11" fill="#64748b">Weight value</text>

  <circle cx="155" cy="92" r="12" fill="#ef4444" filter="url(#s4)"/>
  <text x="155" y="97" text-anchor="middle" font-size="9" font-weight="700" fill="white">1</text>
  <text x="155" y="78" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">start</text>

  <path d="M 167,98 C 185,120 200,150 218,170" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="5,3"/>

  <circle cx="230" cy="185" r="12" fill="#f97316" filter="url(#s4)"/>
  <text x="230" y="190" text-anchor="middle" font-size="9" font-weight="700" fill="white">2</text>

  <path d="M 242,192 C 260,215 270,230 285,238" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="5,3"/>

  <circle cx="300" cy="248" r="12" fill="#eab308" filter="url(#s4)"/>
  <text x="300" y="253" text-anchor="middle" font-size="9" font-weight="700" fill="white">3</text>

  <path d="M 312,252 C 325,258 340,260 348,258" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>

  <circle cx="360" cy="257" r="14" fill="#22c55e" filter="url(#s4)"/>
  <text x="360" y="262" text-anchor="middle" font-size="9" font-weight="700" fill="white">4</text>

  <!-- Star shape at minimum -->
  <polygon points="360,225 363,233 372,233 365,238 367,247 360,242 353,247 355,238 348,233 357,233" fill="#facc15" stroke="#eab308" stroke-width="1"/>

  <rect x="425" y="80" width="260" height="140" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#s4)"/>
  <text x="445" y="105" font-size="12" font-weight="700" fill="#1e293b">How it works:</text>
  <circle cx="445" cy="125" r="5" fill="#ef4444"/>
  <text x="457" y="129" font-size="11" fill="#475569">Start with random weights</text>
  <circle cx="445" cy="148" r="5" fill="#f97316"/>
  <text x="457" y="152" font-size="11" fill="#475569">Calculate the slope (gradient)</text>
  <circle cx="445" cy="171" r="5" fill="#eab308"/>
  <text x="457" y="175" font-size="11" fill="#475569">Step in the downhill direction</text>
  <circle cx="445" cy="194" r="5" fill="#22c55e"/>
  <text x="457" y="198" font-size="11" fill="#475569">Repeat until loss is minimized</text>

  <text x="360" y="312" text-anchor="middle" font-size="11" fill="#64748b">Each step adjusts the weights a little bit in the direction that reduces the error.</text>
</svg>
