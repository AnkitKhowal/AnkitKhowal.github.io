<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --muted: #555;
      --accent: #2563eb;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
      --table-stripe: #f9fafb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f1a;
        --text: #e4e4e7;
        --muted: #a1a1aa;
        --accent: #60a5fa;
        --border: #27272a;
        --code-bg: #1e1e2e;
        --table-stripe: #18181b;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 17px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--border);
    }

    h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    p { margin-bottom: 1rem; }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5rem auto;
      border-radius: 8px;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    strong { font-weight: 600; }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--muted);
      background: var(--code-bg);
      border-radius: 0 6px 6px 0;
    }

    code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    pre {
      background: var(--code-bg);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
      border: 1px solid var(--border);
    }

    pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }

    ul, ol {
      margin: 0.75rem 0 1rem 1.5rem;
    }

    li { margin-bottom: 0.35rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.92em;
    }

    th, td {
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: var(--code-bg);
      font-weight: 600;
    }

    tr:nth-child(even) { background: var(--table-stripe); }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    .post-meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/">{{ site.title }}</a>
    </header>

    {{ content }}

    <footer>
      &copy; {{ site.time | date: '%Y' }} {{ site.title }}
    </footer>
  </div>
</body>
</html>
